version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: peopledb
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password_belirle}
      POSTGRES_DB: ${DB_NAME:-peopledb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    container_name: people_backend
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres_password_belirle}
      - DB_NAME=${DB_NAME:-peopledb}
      - PORT=5000
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: people_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
